<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRBP Case Management</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');
:root{
  --paper:#F6F2E9; --card:#FFFDF8; --ink:#1B2A2A; --muted:#5E6B6B; --faint:#8A8D85;
  --line:#E6DECF; --teal:#0E5C54; --teal-d:#0A453F; --clay:#B5562F; --amber:#C98A2B; --plum:#7A4E6E;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{font-family:'IBM Plex Sans',-apple-system,Segoe UI,sans-serif;color:var(--ink);background:var(--paper);font-size:14px;line-height:1.5;}
h1,h2,h3{font-family:'Fraunces','Georgia',serif;font-weight:600;letter-spacing:-.01em;margin:0;}
.app{display:flex;height:100vh;overflow:hidden;}

/* sidebar */
.sidebar{width:236px;flex-shrink:0;background:var(--teal-d);color:#D9E5E2;display:flex;flex-direction:column;padding:22px 14px;}
.brand{display:flex;gap:11px;align-items:center;padding:4px 8px 22px;}
.brand-mark{width:34px;height:34px;border-radius:9px;background:#F6F2E9;color:var(--teal-d);display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Fraunces',serif;}
.brand-title{font-family:'Fraunces',serif;font-size:19px;font-weight:600;color:#fff;line-height:1;}
.brand-sub{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#8FB3AD;margin-top:3px;}
.nav{display:flex;flex-direction:column;gap:3px;}
.nav-item{display:flex;align-items:center;gap:11px;width:100%;padding:11px 12px;border:0;cursor:pointer;background:transparent;color:#B6CCC8;border-radius:9px;font:inherit;font-size:13.5px;text-align:left;transition:.15s;}
.nav-item .lbl{flex:1;}
.nav-item:hover{background:rgba(255,255,255,.06);color:#EAF3F1;}
.nav-item.active{background:var(--teal);color:#fff;}
.nav-count{font-family:'IBM Plex Mono',monospace;font-size:11px;background:rgba(255,255,255,.14);color:#fff;padding:1px 7px;border-radius:20px;}
.side-foot{margin-top:auto;font-size:11px;color:#6E9089;line-height:1.7;padding:14px 10px 2px;border-top:1px solid rgba(255,255,255,.08);}
.side-tools{display:flex;flex-direction:column;gap:6px;margin-top:14px;}
.side-tools button{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#CFE0DC;font:inherit;font-size:12px;padding:8px 10px;border-radius:8px;cursor:pointer;text-align:left;display:flex;gap:8px;align-items:center;}
.side-tools button:hover{background:rgba(255,255,255,.13);color:#fff;}

/* content */
.content{flex:1;overflow-y:auto;}
.page{max-width:1180px;margin:0 auto;padding:34px 40px 60px;}
.page-head{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-bottom:26px;}
.eyebrow{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--teal);font-weight:600;margin:0 0 6px;}
.page-head h1{font-size:30px;}
.subtitle{color:var(--muted);margin:6px 0 0;font-size:13px;}
.head-actions{display:flex;gap:10px;}

.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:9px;font:inherit;font-size:13.5px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:.15s;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn.primary{background:var(--teal);color:#fff;}
.btn.primary:not(:disabled):hover{background:var(--teal-d);}
.btn.ghost{background:var(--card);color:var(--ink);border-color:var(--line);}
.btn.ghost:not(:disabled):hover{border-color:var(--teal);color:var(--teal);}
.btn.danger{background:var(--clay);color:#fff;}
.btn.danger:hover{background:#9A4626;}

.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px;}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:18px;}
.kpi-value{font-family:'IBM Plex Mono',monospace;font-size:34px;font-weight:600;line-height:1;}
.kpi-label{font-size:12px;color:var(--muted);margin-top:9px;}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.panel{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:18px 20px;min-width:0;}
.panel.wide{grid-column:1 / -1;}
.panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.panel-head h3{font-size:15px;}
.tag-sensitive{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--plum);background:rgba(122,78,110,.08);border:1px solid rgba(122,78,110,.18);padding:2px 8px;border-radius:20px;}

/* bar chart */
.bars{display:flex;flex-direction:column;gap:9px;}
.bar-row{display:grid;grid-template-columns:150px 1fr 34px;gap:10px;align-items:center;font-size:12.5px;}
.bar-label{color:#3C4A4A;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{background:#F1ECE0;border-radius:6px;height:18px;overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;transition:width .4s ease;}
.bar-val{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);text-align:right;}
.donut-wrap{display:flex;align-items:center;gap:22px;}
.donut{width:130px;height:130px;border-radius:50%;flex-shrink:0;}
.donut-hole{position:relative;}
.legend{display:flex;flex-direction:column;gap:8px;font-size:12.5px;}
.legend-item{display:flex;align-items:center;gap:8px;}
.dot{width:11px;height:11px;border-radius:3px;flex-shrink:0;}
.chart-empty{color:var(--faint);font-size:13px;padding:24px 0;text-align:center;}

.empty{background:var(--card);border:1px dashed var(--line);border-radius:13px;padding:60px 40px;text-align:center;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:12px;}
.empty h3{font-size:20px;color:var(--ink);}
.empty p{max-width:430px;margin:0;}
.empty-actions{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;justify-content:center;}

.toolbar{display:flex;gap:10px;margin-bottom:16px;}
.search{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:0 12px;flex:1;max-width:360px;}
.search input{border:0;outline:0;background:transparent;font:inherit;padding:10px 0;width:100%;color:var(--ink);}
.filter{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:0 12px;font:inherit;font-size:13.5px;color:var(--ink);}
.table-wrap{background:var(--card);border:1px solid var(--line);border-radius:13px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead th{text-align:left;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:600;padding:13px 16px;background:#FBF8F1;border-bottom:1px solid var(--line);}
tbody tr{border-bottom:1px solid #F0EADC;cursor:pointer;transition:background .12s;}
tbody tr:last-child{border-bottom:0;}
tbody tr:hover{background:#FBF8F1;}
tbody td{padding:13px 16px;font-size:13.5px;color:#33403F;vertical-align:middle;}
.badge{display:inline-block;font-size:11.5px;font-weight:500;padding:3px 10px;border-radius:20px;border:1px solid;}
.row-actions{white-space:nowrap;text-align:right;width:1%;}
.icon-btn{background:transparent;border:0;padding:7px 9px;border-radius:8px;cursor:pointer;color:var(--muted);transition:.13s;font-size:13px;}
.icon-btn:hover{background:#EFEADC;color:var(--ink);}
.icon-btn.danger:hover{background:rgba(181,86,47,.1);color:var(--clay);}

.overlay{position:fixed;inset:0;background:rgba(27,42,42,.42);display:flex;justify-content:flex-end;z-index:50;}
.overlay.center{justify-content:center;align-items:center;}
.panel-form{width:640px;max-width:94vw;height:100%;background:var(--paper);display:flex;flex-direction:column;box-shadow:-12px 0 40px rgba(0,0,0,.18);animation:slide .26s cubic-bezier(.2,.8,.2,1);}
@keyframes slide{from{transform:translateX(40px);opacity:.6;}to{transform:none;opacity:1;}}
.form-head{display:flex;justify-content:space-between;align-items:flex-start;padding:22px 26px 16px;border-bottom:1px solid var(--line);background:var(--card);}
.form-head h2{font-size:22px;}
.notice{display:flex;gap:9px;align-items:center;font-size:12.5px;color:#6B4760;background:rgba(122,78,110,.08);padding:10px 26px;border-bottom:1px solid var(--line);}
.form-body{flex:1;overflow-y:auto;padding:8px 26px 20px;}
fieldset{border:0;padding:18px 0 6px;margin:0;border-bottom:1px solid var(--line);}
fieldset:last-child{border-bottom:0;}
legend{font-family:'Fraunces',serif;font-size:14px;font-weight:600;color:var(--teal);padding:0;margin-bottom:4px;}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px 16px;margin-top:10px;}
.field{display:flex;flex-direction:column;gap:5px;min-width:0;}
.field.full{grid-column:1 / -1;}
.field label{font-size:12px;color:var(--muted);font-weight:500;}
.req{color:var(--clay);margin-left:3px;}
.field input,.field select,.field textarea{font:inherit;font-size:13.5px;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:8px;padding:9px 11px;outline:0;transition:.13s;width:100%;resize:vertical;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,92,84,.13);}
.form-foot{border-top:1px solid var(--line);background:var(--card);padding:14px 26px;display:flex;justify-content:space-between;align-items:center;gap:14px;}
.hint{font-size:12px;color:var(--clay);}
.foot-btns{display:flex;gap:10px;margin-left:auto;}

.confirm{background:var(--card);border-radius:15px;padding:30px;width:380px;max-width:90vw;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:0 20px 50px rgba(0,0,0,.25);}
.confirm h3{font-size:19px;}
.confirm p{color:var(--muted);margin:0;}
.confirm-actions{display:flex;gap:10px;margin-top:10px;}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--teal-d);color:#fff;padding:11px 20px;border-radius:10px;font-size:13.5px;z-index:60;box-shadow:0 10px 30px rgba(0,0,0,.25);}
.hidden{display:none;}
@media(max-width:1080px){.kpis{grid-template-columns:repeat(2,1fr);}.grid{grid-template-columns:1fr;}}
@media(max-width:680px){.sidebar{display:none;}.page{padding:22px 18px 50px;}.bar-row{grid-template-columns:110px 1fr 30px;}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">H</div>
      <div><div class="brand-title">HRBP</div><div class="brand-sub">Case Management</div></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="side-tools">
      <button onclick="exportData()">⭳ Backup data (file)</button>
      <button onclick="document.getElementById('importFile').click()">⭱ Restore from backup</button>
      <input type="file" id="importFile" accept="application/json" class="hidden" onchange="importData(event)">
      <button onclick="loadSample()">★ Load sample data</button>
      <button onclick="clearAll()">⌫ Clear all data</button>
    </div>
    <div class="side-foot">People &amp; Safety · Confidential<br>Data is saved in this browser</div>
  </aside>
  <main class="content" id="content"></main>
</div>
<div id="overlay"></div>
<div id="toast"></div>

<script>

const MATTER_FIELDS=[

 {section:"Issue & outcome",fields:[

   {k:"outcome",l:"Outcome",t:"select",o:OUTCOME},
   {k:"notes",l:"Notes / status update",t:"textarea",full:true}]},
 {section:"Investigation",fields:[

];
const SH_FIELDS=[

   {k:"dateComplaint",l:"Date of complaint",t:"date",req:true},
   {k:"shType",l:"Type of SH complaint",t:"select",o:SH_TYPES},

const SH_CSV=[["dateComplaint","Date of Complaint"],["empName","Employee Name"],["empPos","Position Title"],["empGender","Gender"],["empClass","Classification"],["disability","Disability Y/N"],["ethnicity","Ethnicity & Race"],["orientation","Sexual Orientation"],["respName","Respondent Name"],["respPos","Position Title"],["respGender","Gender"],["respClass","Classification"],["shType","Type of SH Complaint"],["location","Location of Alleged Conduct"],["actionTaken","Action Taken"],["outcome","Outcome"],["reasons","Reason(s)"],["decisionMaker","Final Decision Maker"],["decisionMakerPos","Position Title"]];

/* ----------------------------- state / storage ------------------------- */
const K_M="hrbp_matters", K_S="hrbp_sh";
let state={view:"dashboard",matters:[],sh:[],query:"",statusFilter:""};
let formKind=null,formData={},editingId=null;

function load(){
  const hasM=localStorage.getItem(K_M)!==null, hasS=localStorage.getItem(K_S)!==null;
  if(!hasM&&!hasS){state.matters=SAMPLE_MATTERS.slice();state.sh=SAMPLE_SH.slice();save();return;}
  try{state.matters=JSON.parse(localStorage.getItem(K_M))||[];}catch(e){state.matters=[];}
  try{state.sh=JSON.parse(localStorage.getItem(K_S))||[];}catch(e){state.sh=[];}
}
function save(){
  localStorage.setItem(K_M,JSON.stringify(state.matters));
  localStorage.setItem(K_S,JSON.stringify(state.sh));
}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const today=()=>new Date().toISOString().slice(0,10);
const esc=s=>(s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const fmtDate=d=>{if(!d)return"—";const x=new Date(d+"T00:00:00");return isNaN(x)?esc(d):x.toLocaleDateString("en-AU",{day:"2-digit",month:"short",year:"numeric"});};
function countBy(rows,key){const m={};rows.forEach(r=>{const v=(r[key]||"").trim();if(v)m[v]=(m[v]||0)+1;});return Object.entries(m).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);}
function toast(msg){const t=document.getElementById("toast");t.innerHTML='<div class="toast">'+esc(msg)+'</div>';setTimeout(()=>t.innerHTML="",2400);}

/* ----------------------------- charts ---------------------------------- */
function barChart(data,colorFn){
  if(!data.length)return '<div class="chart-empty">No data</div>';
  const max=Math.max(...data.map(d=>d.value));
  return '<div class="bars">'+data.map(d=>{
    const c=typeof colorFn==="function"?colorFn(d.name):colorFn;
    const w=Math.max(4,(d.value/max)*100);
    return '<div class="bar-row"><span class="bar-label" title="'+esc(d.name)+'">'+esc(d.name)+'</span>'+
      '<span class="bar-track"><span class="bar-fill" style="width:'+w+'%;background:'+c+'"></span></span>'+
      '<span class="bar-val">'+d.value+'</span></div>';
  }).join("")+'</div>';
}
function donutChart(data){
  if(!data.length)return '<div class="chart-empty">No data</div>';
  const total=data.reduce((s,d)=>s+d.value,0);
  let acc=0,stops=[];
  data.forEach((d,i)=>{const c=IMPACT_COLOR[d.name]||PALETTE[i%PALETTE.length];const start=acc/total*360;acc+=d.value;const end=acc/total*360;stops.push(c+" "+start+"deg "+end+"deg");});
  const legend=data.map((d,i)=>{const c=IMPACT_COLOR[d.name]||PALETTE[i%PALETTE.length];const pct=Math.round(d.value/total*100);return '<div class="legend-item"><span class="dot" style="background:'+c+'"></span>'+esc(d.name)+' · '+d.value+' ('+pct+'%)</div>';}).join("");
  return '<div class="donut-wrap"><div class="donut" style="background:conic-gradient('+stops.join(",")+');-webkit-mask:radial-gradient(circle 38px at center,transparent 98%,#000 100%);mask:radial-gradient(circle 38px at center,transparent 98%,#000 100%);"></div><div class="legend">'+legend+'</div></div>';
}

function renderNav(){

  document.getElementById("nav").innerHTML=items.map(([id,lbl,c])=>
    '<button class="nav-item'+(state.view===id?" active":"")+'" onclick="go(\''+id+'\')"><span class="lbl">'+lbl+'</span>'+(c!=null?'<span class="nav-count">'+c+'</span>':'')+'</button>'
  ).join("");
}
function go(v){state.view=v;state.query="";state.statusFilter="";render();}

function render(){
  renderNav();
  const c=document.getElementById("content");
  if(state.view==="dashboard")c.innerHTML=dashboardHTML();
  else if(state.view==="matters")c.innerHTML=listHTML("matter");
  else c.innerHTML=listHTML("sh");
}

function dashboardHTML(){
  const m=state.matters,s=state.sh;
  if(!m.length&&!s.length){
    return '<div class="page"><div class="page-head"><div><p class="eyebrow">Overview</p><h1>Case Management Reports</h1></div></div>'+
      '<div class="empty"><h3>No data yet</h3><p>Start by logging a case in Employee Matters or the SH Register. Reports build automatically as records are added.</p>'+
      '<div class="empty-actions"><button class="btn primary" onclick="openForm(\'matter\')">+ New employee matter</button><button class="btn ghost" onclick="go(\'sh\')">SH register</button></div></div></div>';
  }
  const open=m.filter(x=>x.status&&x.status!=="Closed").length;
  const inInv=m.filter(x=>(x.proceed||"").indexOf("Yes")===0).length;
  const high=m.filter(x=>x.impact==="High").length;
  const byStatus=STATUS.map(st=>({name:st,value:m.filter(x=>x.status===st).length})).filter(d=>d.value);
  const byImpact=IMPACT.map(i=>({name:i,value:m.filter(x=>x.impact===i).length})).filter(d=>d.value);
  const byCat=countBy(m,"categories").slice(0,8);
  const byDir=countBy(m,"directorate");
  const shType=countBy(s,"shType").slice(0,8);
  const shAct=countBy(s,"actionTaken");
  const kpi=(v,l,col)=>'<div class="kpi"><div class="kpi-value" style="color:'+(col||"#1B2A2A")+'">'+v+'</div><div class="kpi-label">'+l+'</div></div>';
  const panel=(title,body,wide,sens)=>'<section class="panel'+(wide?" wide":"")+'"><div class="panel-head"><h3>'+title+'</h3>'+(sens?'<span class="tag-sensitive">Confidential</span>':'')+'</div>'+body+'</section>';
  let html='<div class="page"><div class="page-head"><div><p class="eyebrow">Overview</p><h1>Case Management Reports</h1></div></div>';
  html+='<div class="kpis">'+kpi(m.length,"Total matters")+kpi(open,"Open matters","#0E5C54")+kpi(inInv,"In investigation","#C98A2B")+kpi(high,"High impact","#B5562F")+kpi(s.length,"SH complaints","#7A4E6E")+'</div>';
  html+='<div class="grid">';
  html+=panel("Matters by status",barChart(byStatus,n=>STATUS_COLOR[n]||"#0E5C54"));
  html+=panel("Impact",donutChart(byImpact));
  html+=panel("Matters by category",barChart(byCat,"#0E5C54"),true);
  html+=panel("By directorate",barChart(byDir,n=>{const i=byDir.findIndex(d=>d.name===n);return PALETTE[i%PALETTE.length];}));
  if(s.length){
    html+=panel("SH complaints by type",barChart(shType,"#7A4E6E"),true,true);
    html+=panel("SH action taken",barChart(shAct,n=>{const i=shAct.findIndex(d=>d.name===n);return PALETTE[i%PALETTE.length];}),false,true);
  }
  html+='</div></div>';
  return html;
}

function listHTML(kind){
  const isM=kind==="matter";
  const rows=isM?state.matters:state.sh;
  const cols=isM?[["cmRef","Ref"],["complainant","Complainant"],["categories","Category"],["directorate","Directorate"],["status","Status","status"],["impact","Impact","impact"],["lastUpdated","Updated","date"]]
                :[["dateComplaint","Date","date"],["empName","Complainant"],["shType","Type"],["location","Location"],["actionTaken","Action"],["outcome","Outcome"]];
  const q=state.query.toLowerCase();
  let filtered=rows.filter(r=>{
    if(isM&&state.statusFilter&&r.status!==state.statusFilter)return false;
    if(!q)return true;
    return Object.values(r).some(v=>(v||"").toString().toLowerCase().includes(q));
  });
  const title=isM?"Employee Matters":"Sexual Harassment Register";
  const sub=isM?"HR Business Partner case register":"Recorded per the Gender Equality Act 2020";
  let html='<div class="page"><div class="page-head"><div><p class="eyebrow">'+(isM?"Register":"Restricted register")+'</p><h1>'+title+'</h1><p class="subtitle">'+sub+'</p></div>'+
    '<div class="head-actions"><button class="btn ghost" '+(rows.length?'':'disabled')+' onclick="exportCSV(\''+kind+'\')">⭳ Export CSV</button>'+
    '<button class="btn primary" onclick="openForm(\''+kind+'\')">+ New record</button></div></div>';
  html+='<div class="toolbar"><div class="search"><span>⌕</span><input placeholder="Search records…" value="'+esc(state.query)+'" oninput="state.query=this.value;refreshList(\''+kind+'\')"></div>';
  if(isM){html+='<select class="filter" onchange="state.statusFilter=this.value;refreshList(\'matter\')"><option value="">All statuses</option>'+STATUS.map(s=>'<option'+(state.statusFilter===s?" selected":"")+'>'+s+'</option>').join("")+'</select>';}
  html+='</div><div id="listBody">'+tableHTML(kind,filtered,cols)+'</div></div>';
  return html;
}
function tableHTML(kind,filtered,cols){
  const rows=kind==="matter"?state.matters:state.sh;
  if(!filtered.length){
    return '<div class="empty"><h3 style="font-size:16px">'+(rows.length?"No records match your search":"No records yet")+'</h3>'+(rows.length?"":"<p>Add your first one with the “New record” button.</p>")+'</div>';
  }
  let h='<div class="table-wrap"><table><thead><tr>'+cols.map(c=>'<th>'+c[1]+'</th>').join("")+'<th></th></tr></thead><tbody>';
  filtered.forEach(r=>{
    h+='<tr onclick="openForm(\''+kind+'\',\''+r.id+'\')">';
    cols.forEach(c=>{
      let cell;
      if(c[2]==="status"&&r[c[0]])cell='<span class="badge" style="color:'+STATUS_COLOR[r[c[0]]]+';background:'+STATUS_COLOR[r[c[0]]]+'1A;border-color:'+STATUS_COLOR[r[c[0]]]+'33">'+esc(r[c[0]])+'</span>';
      else if(c[2]==="impact"&&r[c[0]])cell='<span class="badge" style="color:'+IMPACT_COLOR[r[c[0]]]+';background:'+IMPACT_COLOR[r[c[0]]]+'1A;border-color:'+IMPACT_COLOR[r[c[0]]]+'33">'+esc(r[c[0]])+'</span>';
      else if(c[2]==="date")cell=fmtDate(r[c[0]]);
      else cell=esc(r[c[0]]||"—");
      h+='<td>'+cell+'</td>';
    });
    h+='<td class="row-actions" onclick="event.stopPropagation()"><button class="icon-btn" title="Edit" onclick="openForm(\''+kind+'\',\''+r.id+'\')">✎</button><button class="icon-btn danger" title="Delete" onclick="askDelete(\''+kind+'\',\''+r.id+'\')">🗑</button></td>';
    h+='</tr>';
  });
  return h+'</tbody></table></div>';
}
function refreshList(kind){
  const isM=kind==="matter";
  const rows=isM?state.matters:state.sh;
  const cols=isM?[["cmRef","Ref"],["complainant","Complainant"],["categories","Category"],["directorate","Directorate"],["status","Status","status"],["impact","Impact","impact"],["lastUpdated","Updated","date"]]
                :[["dateComplaint","Date","date"],["empName","Complainant"],["shType","Type"],["location","Location"],["actionTaken","Action"],["outcome","Outcome"]];
  const q=state.query.toLowerCase();
  const filtered=rows.filter(r=>{if(isM&&state.statusFilter&&r.status!==state.statusFilter)return false;if(!q)return true;return Object.values(r).some(v=>(v||"").toString().toLowerCase().includes(q));});
  document.getElementById("listBody").innerHTML=tableHTML(kind,filtered,cols);
}

/* ----------------------------- form ------------------------------------ */
function openForm(kind,id){
  formKind=kind;editingId=id||null;
  const rows=kind==="matter"?state.matters:state.sh;
  const rec=id?rows.find(r=>r.id===id):null;
  formData=rec?Object.assign({},rec):(kind==="matter"?{status:"Preliminary",lastUpdated:today()}:{dateComplaint:today()});
  const cfg=kind==="matter"?MATTER_FIELDS:SH_FIELDS;
  const isM=kind==="matter";
  let body=cfg.map(sec=>{
    return '<fieldset><legend>'+sec.section+'</legend><div class="field-grid">'+sec.fields.map(f=>{
      const val=formData[f.k]||"";const req=f.req?'<span class="req">*</span>':'';let input;
      if(f.t==="select")input='<select data-key="'+f.k+'"><option value="">Select…</option>'+f.o.map(o=>'<option'+(o===val?" selected":"")+'>'+esc(o)+'</option>').join("")+'</select>';
      else if(f.t==="textarea")input='<textarea data-key="'+f.k+'" rows="3">'+esc(val)+'</textarea>';
      else input='<input type="'+f.t+'" data-key="'+f.k+'" value="'+esc(val)+'">';
      return '<div class="field'+(f.full||f.t==="textarea"?" full":"")+'"><label>'+esc(f.l)+req+'</label>'+input+'</div>';
    }).join("")+'</div></fieldset>';
  }).join("");
  const html='<div class="overlay" onclick="closeForm(event)"><div class="panel-form" onclick="event.stopPropagation()">'+
    '<div class="form-head"><div><p class="eyebrow">'+(id?"Edit record":"New record")+'</p><h2>'+(isM?"Employee Matter":"Sexual Harassment Complaint")+'</h2></div><button class="icon-btn" style="font-size:20px" onclick="closeForm()">✕</button></div>'+
    (isM?"":'<div class="notice">⚠ Confidential — recorded per the Gender Equality Act 2020. Capture only what is necessary.</div>')+
    '<div class="form-body" id="formBody">'+body+'</div>'+
    '<div class="form-foot"><span class="hint" id="formHint"></span><div class="foot-btns"><button class="btn ghost" onclick="closeForm()">Cancel</button><button class="btn primary" id="saveBtn" onclick="saveRecord()">'+(id?"Save changes":"Add record")+'</button></div></div>'+
    '</div></div>';
  document.getElementById("overlay").innerHTML=html;
  const fb=document.getElementById("formBody");
  fb.addEventListener("input",e=>{const k=e.target.getAttribute("data-key");if(k){formData[k]=e.target.value;validate();}});
  validate();
}
function reqOk(){const cfg=formKind==="matter"?MATTER_FIELDS:SH_FIELDS;return cfg.flatMap(s=>s.fields).filter(f=>f.req).every(f=>(formData[f.k]||"").toString().trim());}
function validate(){const ok=reqOk();document.getElementById("saveBtn").disabled=!ok;document.getElementById("formHint").textContent=ok?"":"Complete required fields (*) to save";}
function closeForm(e){if(e&&e.target&&!e.target.classList.contains("overlay"))return;document.getElementById("overlay").innerHTML="";}
function saveRecord(){
  if(!reqOk())return;
  const rec=Object.assign({},formData);
  if(formKind==="matter")rec.lastUpdated=rec.lastUpdated||today();
  if(editingId){
    rec.id=editingId;rec.updatedAt=new Date().toISOString();
    if(formKind==="matter")state.matters=state.matters.map(r=>r.id===editingId?rec:r);else state.sh=state.sh.map(r=>r.id===editingId?rec:r);
  }else{
    rec.id=uid();rec.updatedAt=new Date().toISOString();
    if(formKind==="matter")state.matters.unshift(rec);else state.sh.unshift(rec);
  }
  save();document.getElementById("overlay").innerHTML="";render();toast(editingId?"Record updated":"Record added");
}

/* ----------------------------- delete ---------------------------------- */
function askDelete(kind,id){
  const rows=kind==="matter"?state.matters:state.sh;const r=rows.find(x=>x.id===id);
  const label=esc(kind==="matter"?(r.cmRef||"this case"):(r.empName||"this complaint"));
  document.getElementById("overlay").innerHTML='<div class="overlay center" onclick="closeForm(event)"><div class="confirm" onclick="event.stopPropagation()">'+
    '<div style="font-size:26px">⚠</div><h3>Delete record</h3><p>Permanently remove <strong>'+label+'</strong>? This cannot be undone.</p>'+
    '<div class="confirm-actions"><button class="btn ghost" onclick="closeForm()">Cancel</button><button class="btn danger" onclick="doDelete(\''+kind+'\',\''+id+'\')">Delete</button></div></div></div>';
}
function doDelete(kind,id){
  if(kind==="matter")state.matters=state.matters.filter(r=>r.id!==id);else state.sh=state.sh.filter(r=>r.id!==id);
  save();document.getElementById("overlay").innerHTML="";render();toast("Record deleted");
}

/* ----------------------------- export / import ------------------------- */
function csvEsc(v){const s=(v==null?"":String(v));return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}
function exportCSV(kind){
  const rows=kind==="matter"?state.matters:state.sh;const cols=kind==="matter"?MATTER_CSV:SH_CSV;
  const head=cols.map(c=>csvEsc(c[1])).join(",");
  const body=rows.map(r=>cols.map(c=>csvEsc(r[c[0]])).join(",")).join("\n");
  downloadFile("\uFEFF"+head+"\n"+body,(kind==="matter"?"Employee_Matters":"Sexual_Harassment_Register")+".csv","text/csv;charset=utf-8;");
}
function exportData(){
  const payload={app:"HRBP Case Management",exported:new Date().toISOString(),matters:state.matters,sh:state.sh};
  downloadFile(JSON.stringify(payload,null,2),"HRBP_data_backup_"+today()+".json","application/json");
  toast("Backup downloaded");
}
function importData(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const d=JSON.parse(reader.result);
      if(!d||!Array.isArray(d.matters)||!Array.isArray(d.sh))throw new Error("bad");
      if(!confirm("Replace all current data with the backup file? ("+d.matters.length+" matters, "+d.sh.length+" SH records)"))return;
      state.matters=d.matters;state.sh=d.sh;save();render();toast("Backup restored");
    }catch(e){alert("That file could not be read as a valid HRBP backup.");}
  };
  reader.readAsText(file);ev.target.value="";
}
function downloadFile(content,name,type){
  const blob=new Blob([content],{type});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href);
}

/* ----------------------------- init ------------------------------------ */
function loadSample(){
  if(!confirm("Replace all current data with sample test records? ("+SAMPLE_MATTERS.length+" matters, "+SAMPLE_SH.length+" SH records)"))return;
  state.matters=SAMPLE_MATTERS.slice();state.sh=SAMPLE_SH.slice();save();render();toast("Sample data loaded");
}
function clearAll(){
  if(!confirm("Permanently delete ALL records from this browser? This cannot be undone."))return;
  state.matters=[];state.sh=[];save();render();toast("All data cleared");
}
load();render();
</script>
